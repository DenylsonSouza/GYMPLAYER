<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONSTER PLAYER - DROPBOX OFFLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,900;1,900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Estética Agressiva Denylson Monster */
        .monster-text {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .monster-title {
            font-size: clamp(3rem, 15vw, 8rem);
            line-height: 0.8;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.7));
            color: #2563eb;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 4px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        .progress-bar {
            height: 16px;
            background: #111827;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: #3b82f6;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 25px #3b82f6;
        }

        .song-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .song-card.active {
            border-color: #3b82f6;
            background: rgba(37, 99, 235, 0.25);
            transform: scale(1.02);
        }

        .status-msg {
            font-size: 0.75rem;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: none;
            border-left: 10px solid;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .offline-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* UX Engineering: Estilos do Progresso Circular */
        .circular-progress {
            transform: rotate(-90deg);
        }
        .circular-progress-circle {
            transition: stroke-dashoffset 0.1s linear;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md flex flex-col gap-8 pt-6">
        <!-- Header Hardcore -->
        <header class="text-center transform -rotate-2">
            <h1 class="monster-text monster-title">MONSTER</h1>
            <h2 class="monster-text text-3xl text-white opacity-80 mt-[-10px]">DROPBOX</h2>
            <p class="text-[10px] font-black tracking-[0.5em] text-blue-500 mt-2 uppercase">Offline Guard • Denylson PRO</p>
        </header>

        <div id="status-display" class="status-msg monster-text italic tracking-wider"></div>

        <!-- Secção de Adição -->
        <section class="glass-card p-6 rounded-[2.5rem] flex flex-col gap-5">
            <div class="flex flex-col gap-2">
                <label class="monster-text text-[10px] text-blue-500 tracking-widest ml-2">TRACK ID</label>
                <input type="text" id="song-name" placeholder="NOME DA FAIXA" 
                    class="bg-black/50 border border-blue-500/20 rounded-xl p-4 text-sm focus:border-blue-500 outline-none font-bold uppercase italic text-white placeholder-slate-800">
            </div>
            <div class="flex flex-col gap-2">
                <label class="monster-text text-[10px] text-blue-500 tracking-widest ml-2">DROPBOX URL</label>
                <input type="text" id="song-url" placeholder="COLE O LINK PARTILHADO" 
                    class="bg-black/50 border border-blue-500/20 rounded-xl p-4 text-sm focus:border-blue-500 outline-none text-white placeholder-slate-800">
            </div>
            <button id="add-btn" class="monster-text bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl transition-all flex items-center justify-center gap-3 text-lg shadow-lg active:scale-95">
                <i data-lucide="plus-square" class="w-6 h-6"></i> INJETAR NO SET
            </button>
        </section>

        <!-- Player Ativo -->
        <section id="player-container" class="glass-card p-8 rounded-[3rem] hidden flex flex-col gap-8 shadow-[0_0_100px_rgba(37,99,235,0.4)]">
            <div class="text-center">
                <h3 id="current-title" class="text-3xl monster-text truncate px-2 text-white">READY TO LIFT</h3>
                <div class="flex justify-center mt-3">
                    <span id="player-badge" class="bg-blue-600 text-[10px] px-4 py-1 rounded-full font-black tracking-[0.4em] uppercase">Sinal Ativo</span>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <div id="progress-container" class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div class="flex justify-between text-[12px] font-black text-blue-400 font-mono">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-6">
                <!-- Retroceder 10s -->
                <button id="btn-rewind" class="text-slate-500 hover:text-blue-400 transition-colors active:scale-75" title="Voltar 10s">
                    <i data-lucide="rotate-ccw" class="w-7 h-7"></i>
                </button>
                
                <button id="btn-prev" class="text-slate-400 hover:text-white transition-colors active:scale-75">
                    <i data-lucide="skip-back" class="w-10 h-10 fill-current"></i>
                </button>
                
                <button id="btn-play-pause" class="bg-white text-black w-24 h-24 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(255,255,255,0.3)] hover:scale-105 active:scale-90 transition-all border-[8px] border-blue-600/30">
                    <i data-lucide="play" class="fill-current w-10 h-10 ml-2" id="play-icon"></i>
                </button>
                
                <button id="btn-next" class="text-slate-400 hover:text-white transition-colors active:scale-75">
                    <i data-lucide="skip-forward" class="w-10 h-10 fill-current"></i>
                </button>

                <!-- Avançar 10s -->
                <button id="btn-forward" class="text-slate-500 hover:text-blue-400 transition-colors active:scale-75" title="Avançar 10s">
                    <i data-lucide="rotate-cw" class="w-7 h-7"></i>
                </button>
            </div>
        </section>

        <!-- Library -->
        <section class="flex flex-col gap-5 pb-40">
            <div class="flex justify-between items-end px-4 border-b-8 border-blue-600/30 pb-3">
                <h4 class="monster-text text-blue-500 text-2xl italic">SETLIST</h4>
                <span id="song-count" class="text-white font-black text-[10px] opacity-50 uppercase">0 Tracks</span>
            </div>
            <div id="playlist-container" class="flex flex-col gap-4 px-1"></div>
        </section>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const songNameInput = document.getElementById('song-name');
        const songUrlInput = document.getElementById('song-url');
        const addBtn = document.getElementById('add-btn');
        const playlistContainer = document.getElementById('playlist-container');
        const playerContainer = document.getElementById('player-container');
        const currentTitle = document.getElementById('current-title');
        const playIcon = document.getElementById('play-icon');
        const progressFill = document.getElementById('progress-fill');
        const progressContainer = document.getElementById('progress-container');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const statusDisplay = document.getElementById('status-display');
        const playerBadge = document.getElementById('player-badge');

        let playlist = JSON.parse(localStorage.getItem('monster_setlist_v2')) || [];
        let currentIndex = -1;
        
        // --- ENGENHARIA OFFLINE (IndexedDB) ---
        const DB_NAME = "MonsterOfflineGuard";
        let db;
        let offlineTracks = new Set();

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains("audioBlobs")) {
                        db.createObjectStore("audioBlobs", { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    loadOfflineStatus().then(resolve);
                };
                request.onerror = (e) => reject(e);
            });
        };

        const loadOfflineStatus = () => {
            return new Promise((resolve) => {
                const tx = db.transaction("audioBlobs", "readonly");
                const req = tx.objectStore("audioBlobs").getAllKeys();
                req.onsuccess = () => {
                    offlineTracks = new Set(req.result);
                    resolve();
                };
            });
        };

        window.makeOffline = async (id, url, event) => {
            event.stopPropagation(); // Evita dar play na música ao clicar no botão de transferência
            
            if (offlineTracks.has(id)) {
                showStatus("A FAIXA JÁ ESTÁ OFFLINE!", false);
                return;
            }

            // Engenharia de Link Dinâmico: Garante que mesmo links velhos usem a CDN direta do Dropbox
            let downloadUrl = url;
            try {
                let u = new URL(downloadUrl);
                if(u.hostname.includes('dropbox.com')) {
                    u.hostname = 'dl.dropboxusercontent.com';
                    u.searchParams.delete('dl');
                    u.searchParams.delete('raw');
                    downloadUrl = u.toString();
                }
            } catch(e) { }

            const btn = document.getElementById(`dl-btn-${id}`);
            const icon = document.getElementById(`dl-icon-${id}`);
            const percentTxt = document.getElementById(`dl-percent-${id}`);
            const svg = document.getElementById(`dl-progress-svg-${id}`);
            const circle = document.getElementById(`dl-progress-circle-${id}`);
            const statusText = document.getElementById(`track-status-${id}`);
            
            // UX: Esconde ícone, revela SVG circular e percentagem
            if(icon) icon.classList.add('hidden');
            if(percentTxt) percentTxt.classList.remove('hidden');
            if(svg) svg.classList.remove('hidden');
            if(btn) {
                btn.classList.remove('hover:text-blue-400', 'active:scale-75');
                btn.style.cursor = 'default';
            }
            
            if(statusText) {
                statusText.textContent = "A LIGAR AO SERVIDOR...";
                statusText.classList.remove('text-blue-500');
                statusText.classList.add('text-green-400');
            }

            try {
                const response = await fetch(downloadUrl, { mode: 'cors' });
                if (!response.ok) throw new Error("Erro na rede: " + response.status);
                
                // Engenharia: Leitura do stream de dados para calcular a %
                if (!response.body || !response.body.getReader) {
                    // Fallback para browsers antigos que não suportam stream
                    const blob = await response.blob();
                    const tx = db.transaction("audioBlobs", "readwrite");
                    tx.objectStore("audioBlobs").put({ id: id, blob: blob });
                    tx.oncomplete = () => {
                        offlineTracks.add(id);
                        renderPlaylist();
                        showStatus("SUCESSO: DISPONÍVEL SEM INTERNET!", false);
                    };
                    return;
                }

                const contentLength = response.headers.get('content-length');
                const total = contentLength ? parseInt(contentLength, 10) : 0;
                let loaded = 0;
                const chunks = [];
                
                const reader = response.body.getReader();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    loaded += value.length;
                    
                    if (total) {
                        const percent = Math.round((loaded / total) * 100);
                        // Circunferência de r=15 é aprox 94.25
                        const offset = 94.25 - ((percent / 100) * 94.25);
                        
                        if(circle) circle.style.strokeDashoffset = offset;
                        if(percentTxt) percentTxt.textContent = percent;
                        if(statusText) statusText.textContent = `A TRANSFERIR... ${percent}%`;
                    } else {
                        // Fallback se o Dropbox ocultar o tamanho total (Animação de "loading" circular)
                        if(circle) {
                            circle.style.strokeDasharray = "30 94.25";
                            svg.classList.add('animate-spin');
                        }
                        const mbLoaded = (loaded / (1024 * 1024)).toFixed(1);
                        if(percentTxt) percentTxt.textContent = '...';
                        if(statusText) statusText.textContent = `A TRANSFERIR... ${mbLoaded}MB`;
                    }
                }
                
                const blob = new Blob(chunks, { type: response.headers.get('content-type') || 'audio/mpeg' });
                
                const tx = db.transaction("audioBlobs", "readwrite");
                tx.objectStore("audioBlobs").put({ id: id, blob: blob });
                
                tx.oncomplete = () => {
                    offlineTracks.add(id);
                    renderPlaylist();
                    showStatus("SUCESSO: DISPONÍVEL SEM INTERNET!", false);
                };
            } catch (err) {
                console.error("Erro no Download Offline:", err);
                // Reverte a UI em caso de falha
                if(icon) icon.classList.remove('hidden');
                if(percentTxt) percentTxt.classList.add('hidden');
                if(svg) {
                    svg.classList.remove('animate-spin');
                    svg.classList.add('hidden');
                }
                if(btn) {
                    btn.classList.add('hover:text-blue-400', 'active:scale-75');
                    btn.style.cursor = 'pointer';
                }

                if(statusText) {
                    statusText.textContent = "STREAMING";
                    statusText.classList.remove('text-green-400');
                    statusText.classList.add('text-blue-500');
                }
                showStatus("ERRO: O SERVIDOR BLOQUEOU A TRANSFERÊNCIA. TENTE NOVAMENTE MAIS TARDE.", true);
            }
        };

        const getOfflineBlob = (id) => {
            return new Promise((resolve) => {
                const tx = db.transaction("audioBlobs", "readonly");
                const req = tx.objectStore("audioBlobs").get(id);
                req.onsuccess = () => resolve(req.result ? req.result.blob : null);
                req.onerror = () => resolve(null);
            });
        };

        const deleteOfflineBlob = (id) => {
            if (!offlineTracks.has(id)) return;
            const tx = db.transaction("audioBlobs", "readwrite");
            tx.objectStore("audioBlobs").delete(id);
            tx.oncomplete = () => offlineTracks.delete(id);
        };


        // --- INICIALIZAÇÃO GERAL ---
        async function init() {
            try {
                await initDB();
            } catch (e) {
                console.error("IndexedDB não suportado");
            }
            renderPlaylist();
            lucide.createIcons();
            setupMediaSession();
        }

        function showStatus(msg, isError = false) {
            statusDisplay.textContent = msg;
            statusDisplay.style.display = 'block';
            statusDisplay.style.backgroundColor = isError ? '#450a0a' : '#1e3a8a';
            statusDisplay.style.borderColor = isError ? '#ef4444' : '#2563eb';
            statusDisplay.style.color = isError ? '#fecaca' : '#bfdbfe';
            setTimeout(() => { statusDisplay.style.display = 'none'; }, 4000);
        }

        // --- ENGENHARIA DE URL ---
        function formatDropboxUrl(rawUrl) {
            try {
                let url = new URL(rawUrl.trim());
                // Conversão crítica para o servidor de CDN direta (Bypass CORS)
                if (url.hostname.includes('dropbox.com')) {
                    url.hostname = 'dl.dropboxusercontent.com';
                    url.searchParams.delete('dl');
                    url.searchParams.delete('raw');
                }
                return url.toString();
            } catch (e) {
                return rawUrl.includes('?') ? rawUrl.replace(/dl=[01]/, 'raw=1') : rawUrl + '?raw=1';
            }
        }

        // --- LÓGICA DE PERSISTÊNCIA ---
        addBtn.onclick = () => {
            const name = songNameInput.value.trim();
            const rawUrl = songUrlInput.value.trim();

            if (!name || !rawUrl) {
                showStatus("CAMPOS VAZIOS. OPERAÇÃO CANCELADA.", true);
                return;
            }

            const streamUrl = formatDropboxUrl(rawUrl);
            const newTrack = { id: Date.now(), name: name.toUpperCase(), url: streamUrl };

            playlist.unshift(newTrack);
            localStorage.setItem('monster_setlist_v2', JSON.stringify(playlist));
            renderPlaylist();
            
            songNameInput.value = '';
            songUrlInput.value = '';
            showStatus("TRACK INJETADA NA LISTA.");
        };

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            document.getElementById('song-count').textContent = `${playlist.length} TRACKS`;

            playlist.forEach((track, index) => {
                const isOffline = offlineTracks.has(track.id);
                const div = document.createElement('div');
                div.className = `song-card glass-card p-6 rounded-[2rem] flex items-center justify-between gap-4 cursor-pointer hover:bg-white/5 transition-all ${currentIndex === index ? 'active' : ''}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-5 overflow-hidden flex-1" onclick="playTrack(${index})">
                        <div class="w-16 h-16 ${currentIndex === index ? 'bg-blue-600 shadow-[0_0_30px_#3b82f6]' : 'bg-black'} rounded-2xl flex items-center justify-center flex-shrink-0 transition-all duration-500 relative">
                            <i data-lucide="${currentIndex === index ? 'zap' : 'play-circle'}" class="w-8 h-8 text-white"></i>
                            ${isOffline ? '<div class="absolute -top-2 -right-2 bg-green-500 rounded-full p-1 border-2 border-slate-900"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>' : ''}
                        </div>
                        <div class="flex flex-col overflow-hidden w-full pr-2">
                            <span class="text-xl font-900 truncate text-white italic tracking-tighter uppercase leading-none mb-1">${track.name}</span>
                            <span id="track-status-${track.id}" class="text-[9px] ${isOffline ? 'text-green-500' : 'text-blue-500'} font-black tracking-widest uppercase">${isOffline ? 'PRONTO OFFLINE' : 'STREAMING'}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 relative">
                        ${!isOffline ? `
                        <div class="relative w-10 h-10 flex items-center justify-center">
                            <!-- SVG Progresso Circular Oculto -->
                            <svg id="dl-progress-svg-${track.id}" class="hidden absolute inset-0 w-full h-full circular-progress" viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="15" fill="none" stroke="#1e293b" stroke-width="2.5"></circle>
                                <circle id="dl-progress-circle-${track.id}" class="circular-progress-circle" cx="18" cy="18" r="15" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="94.25" stroke-dashoffset="94.25" stroke-linecap="round"></circle>
                            </svg>
                            <!-- Botão de Transferência / Progresso Textual -->
                            <button id="dl-btn-${track.id}" class="relative z-10 text-slate-500 hover:text-blue-400 transition-all active:scale-75 flex items-center justify-center w-full h-full" title="Salvar Offline" onclick="makeOffline(${track.id}, '${track.url}', event)">
                                <i id="dl-icon-${track.id}" data-lucide="download-cloud" class="w-6 h-6"></i>
                                <span id="dl-percent-${track.id}" class="hidden text-[10px] font-black text-green-400">0</span>
                            </button>
                        </div>
                        ` : ''}
                        <button class="text-slate-700 hover:text-red-500 p-2 transition-all active:scale-50" title="Excluir" onclick="event.stopPropagation(); deleteTrack(${index}, ${track.id})">
                            <i data-lucide="trash-2" class="w-6 h-6"></i>
                        </button>
                    </div>
                `;
                playlistContainer.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- PLAYER CORE ---
        window.playTrack = async (index) => {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const track = playlist[index];
            
            playerContainer.classList.remove('hidden');
            currentTitle.textContent = track.name;
            
            // Lógica de Roteamento (Offline vs Online)
            if (offlineTracks.has(track.id)) {
                const blob = await getOfflineBlob(track.id);
                if (blob) {
                    // Liberta URL antiga da memória para não vazar RAM
                    if(audioPlayer.src.startsWith('blob:')) URL.revokeObjectURL(audioPlayer.src);
                    audioPlayer.src = URL.createObjectURL(blob);
                    
                    playerBadge.textContent = "MODO OFFLINE";
                    playerBadge.className = "offline-badge text-[10px] px-4 py-1 rounded-full font-black tracking-[0.4em] uppercase";
                } else {
                    audioPlayer.src = track.url; // Fallback
                }
            } else {
                audioPlayer.src = track.url;
                playerBadge.textContent = "SINAL ATIVO (ONLINE)";
                playerBadge.className = "bg-blue-600 text-[10px] px-4 py-1 rounded-full font-black tracking-[0.4em] uppercase shadow-[0_0_15px_#3b82f6]";
            }
            
            audioPlayer.load(); 
            audioPlayer.play().then(() => {
                updateMetadata(track.name);
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
            }).catch(e => {
                showStatus("FALHA NO ÁUDIO. VERIFIQUE A LIGAÇÃO.", true);
            });
            
            renderPlaylist();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteTrack = (index, trackId) => {
            if (confirm("REMOVER TRACK?")) {
                playlist.splice(index, 1);
                localStorage.setItem('monster_setlist_v2', JSON.stringify(playlist));
                deleteOfflineBlob(trackId); // Limpa da memória também
                
                if (currentIndex === index) {
                    audioPlayer.pause();
                    playerContainer.classList.add('hidden');
                    currentIndex = -1;
                }
                renderPlaylist();
            }
        };

        // --- MEDIA SESSION & TIME JUMP ---
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => playTrack((currentIndex - 1 + playlist.length) % playlist.length));
                navigator.mediaSession.setActionHandler('nexttrack', () => playTrack((currentIndex + 1) % playlist.length));
            }
        }

        function updateMetadata(title) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title,
                    artist: 'MONSTER GUARD',
                    album: 'DENYLSON PRO SET',
                    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/2964/2964514.png', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        // --- CONTROLOS (+10s e -10s) ---
        document.getElementById('btn-play-pause').onclick = () => {
            audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
        };

        // Adicionando Saltos de Tempo
        document.getElementById('btn-rewind').onclick = () => {
            audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10);
        };

        document.getElementById('btn-forward').onclick = () => {
            audioPlayer.currentTime = Math.min(audioPlayer.duration || 0, audioPlayer.currentTime + 10);
        };

        audioPlayer.onplay = () => {
            playIcon.setAttribute('data-lucide', 'pause');
            lucide.createIcons();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
        };

        audioPlayer.onpause = () => {
            playIcon.setAttribute('data-lucide', 'play');
            lucide.createIcons();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        };

        document.getElementById('btn-next').onclick = () => playTrack((currentIndex + 1) % playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIndex - 1 + playlist.length) % playlist.length);

        audioPlayer.ontimeupdate = () => {
            if (audioPlayer.duration) {
                const perc = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = `${perc}%`;
                const fmt = (s) => Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2,'0');
                timeCurrent.textContent = fmt(audioPlayer.currentTime);
                timeTotal.textContent = fmt(audioPlayer.duration);
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
        };

        audioPlayer.onended = () => document.getElementById('btn-next').click();

        // Inicia a app
        init();
    </script>

    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Aplicação Pronta para Offline!"))
      .catch(err => console.log("Erro no registo:", err));
  }
</script>
